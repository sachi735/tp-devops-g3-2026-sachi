name: Backport a develop

on:
  push:
    branches:
      - main

jobs:
  backport:
    name: Crear PR de backport a develop
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preparar rama de backport
        id: backport
        env:
          BACKPORT_BRANCH: backport/main-to-develop-${{ github.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main develop
          git checkout -B "$BACKPORT_BRANCH" origin/develop

          if git merge --no-ff --no-commit origin/main; then
            if git diff --quiet --cached && git diff --quiet; then
              echo "No hay cambios para backportear."
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            git commit -m "chore: backport main to develop"
            git push --force-with-lease origin "$BACKPORT_BRANCH"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "branch=$BACKPORT_BRANCH" >> "$GITHUB_OUTPUT"
          else
            echo "El backport automatico tiene conflictos."
            git status --short
            git merge --abort || true
            exit 1
          fi

      - name: Crear PR main → develop
        if: steps.backport.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BACKPORT_BRANCH: ${{ steps.backport.outputs.branch }}
        run: |
          gh label create backport \
            --color "ededed" \
            --description "Automatic backport" || true

          if gh pr view "$BACKPORT_BRANCH" --json number --jq .number >/dev/null 2>&1; then
            echo "Ya existe un PR para $BACKPORT_BRANCH."
            exit 0
          fi

          gh pr create \
            --base develop \
            --head "$BACKPORT_BRANCH" \
            --title "chore: backport main → develop" \
            --body "Backport automático de los cambios mergeados a \`main\`.

          Revisá que no haya conflictos antes de mergear." \
            --label backport
