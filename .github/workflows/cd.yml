name: Release - Docker Hub

on:
  push:
    branches:
      - main

jobs:
  tag:
    name: Generar versión semántica
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.new_tag }}

    permissions:
      contents: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version y crear tag
        id: bump
        uses: anothrNick/github-tag-action@1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          WITH_V: false
          TAG_CONTEXT: repo

  build:
    name: Build Docker image
    needs: tag
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ needs.tag.outputs.version }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Generar metadata de build
        id: metadata
        run: echo "build-date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"

      - name: Construir imagen
        run: |
          docker build \
            --build-arg APP_VERSION=${{ needs.tag.outputs.version }} \
            --build-arg GIT_COMMIT=${{ github.sha }} \
            --build-arg BUILD_DATE=${{ steps.metadata.outputs.build-date }} \
            -t devops-tp-api:${{ needs.tag.outputs.version }} \
            -t devops-tp-api:latest \
            .

      - name: Guardar imagen como artefacto
        run: docker save devops-tp-api:${{ needs.tag.outputs.version }} devops-tp-api:latest | gzip > /tmp/docker-image.tar.gz

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/docker-image.tar.gz
          retention-days: 1

  push-to-dockerhub:
    name: Push a Docker Hub
    needs: [tag, build]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Descargar imagen
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Cargar imagen en Docker
        run: docker load < /tmp/docker-image.tar.gz

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push imagen
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/devops-tp-api"
          TAG="${{ needs.tag.outputs.version }}"

          docker tag devops-tp-api:$TAG $IMAGE:$TAG
          docker tag devops-tp-api:latest $IMAGE:latest

          docker push $IMAGE:$TAG
          docker push $IMAGE:latest

          echo "Imagen publicada: $IMAGE:$TAG"

      - name: Trigger deploy en Render
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Deploy disparado en Render"
